<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cute Capybara GIF Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink-soft: #ffe4e6;
            --pink-medium: #fbcfe8;
            --rose-text: #5a3d46;
            --rose-accent: #7a4f5c;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--pink-soft) 0%, var(--pink-medium) 100%);
            background-attachment: fixed;
            color: var(--rose-text);
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* Restoration of Aesthetic Elements */
        .blob {
            position: fixed;
            width: 450px;
            height: 450px;
            background: rgba(255, 255, 255, 0.45);
            border-radius: 50%;
            filter: blur(90px);
            z-index: -1;
            animation: float-blob 28s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        .blob-3 {
            top: 35%;
            left: 55%;
            width: 350px;
            height: 350px;
            animation-delay: -10s;
        }

        @keyframes float-blob {
            0% {
                transform: translate(0, 0) scale(1) rotate(0deg);
            }

            100% {
                transform: translate(70px, 90px) scale(1.3) rotate(30deg);
            }
        }

        .fade-in {
            animation: fadeIn 2s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 35px rgba(251, 207, 232, 0.25);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-8px);
            box-shadow: 0 20px 45px rgba(244, 114, 182, 0.15);
        }

        .message-reveal {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--rose-accent);
        }

        .message-reveal.active {
            max-height: 300px;
            opacity: 1;
            margin-top: 1.25rem;
        }

        .page-section {
            display: none;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s ease;
        }

        .page-section.active {
            display: flex;
            opacity: 1;
            transform: translateY(0);
        }

        /* Capybara Restoration */
        .capybara {
            position: fixed;
            bottom: 40px;
            width: 150px;
            z-index: 10;
            pointer-events: none;
            animation: float-capy 6s infinite ease-in-out;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.06));
        }

        .capy-left {
            left: 40px;
            transform: scaleX(-1);
        }

        .capy-right {
            right: 40px;
        }

        @keyframes float-capy {

            0%,
            100% {
                transform: translateY(0) scaleX(-1);
            }

            50% {
                transform: translateY(-20px) scaleX(-1);
            }
        }

        .capy-right {
            animation-name: float-capy-right;
            transform: none;
        }

        @keyframes float-capy-right {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        @media (max-width: 768px) {
            .capybara {
                width: 100px;
                bottom: 15px;
            }

            .capy-left {
                left: 10px;
            }

            .capy-right {
                right: 10px;
            }
        }

        /* Floating Hearts Animation */
        .floating-heart {
            position: fixed;
            font-size: 2rem;
            pointer-events: none;
            z-index: 1000;
            animation: float-heart 2s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes float-heart {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 1;
            }

            100% {
                transform: translateY(-200px) scale(1.5) rotate(45deg);
                opacity: 0;
            }
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center py-12 px-6 overflow-x-hidden selection:bg-rose-100">

    <!-- background decorative elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <!-- Cute Capybara GIFs -->
    <img src="https://media.tenor.com/bE_sLdM7hX4AAAAi/capybara.gif" alt="Capybara eating" class="capybara capy-left">
    <img src="https://media.tenor.com/mO2j31-Nsq0AAAAi/capybara-bath.gif" alt="Capybara in bath"
        class="capybara capy-right">

    <div class="max-w-2xl w-full flex flex-col items-center relative z-20 min-h-[85vh] justify-center">
        <!-- PAGE 1 -->
        <div id="page-1" class="page-section active flex-col items-center text-center fade-in">
            <h1 class="text-3xl sm:text-4xl font-medium text-rose-800 mb-6 leading-tight">Alam kong importante yang
                ginagawa mo.</h1>
            <p class="mb-10 text-rose-600/90 font-light text-lg">Pahinga ka muna saglit. No need mag-reply ha? Gawa lang
                ako ng space para sa'yo.</p>

            <button onclick="goToPage(2)"
                class="group px-10 py-4 bg-white/60 hover:bg-white/80 border border-white/60 text-rose-800 rounded-full font-medium transition-all shadow-lg active:scale-95 flex items-center gap-3">
                Next <span class="text-xl group-hover:translate-x-1 transition-transform">→</span>
            </button>
        </div>

        <!-- PAGE 2 -->
        <div id="page-2" class="page-section flex-col items-center w-full">
            <h2 class="text-2xl font-medium text-rose-800 mb-8">Simple Reminders</h2>
            <div id="support-cards" class="grid grid-cols-1 sm:grid-cols-2 gap-6 w-full"></div>

            <div class="mt-10 flex gap-6">
                <button onclick="goToPage(1)"
                    class="px-8 py-3 bg-white/30 hover:bg-white/50 border border-white/40 text-rose-800 rounded-full font-medium transition-all active:scale-95">←
                    Back</button>
                <button onclick="goToPage(3)"
                    class="px-8 py-3 bg-white/60 hover:bg-white/80 border border-white/60 text-rose-800 rounded-full font-medium transition-all shadow-lg active:scale-95 flex items-center gap-2">Next
                    →</button>
            </div>
        </div>

        <!-- PAGE 3 -->
        <div id="page-3" class="page-section flex-col items-center text-center">
            <div
                class="glass-card p-12 rounded-[2.5rem] flex flex-col items-center justify-center min-h-[300px] w-full max-w-lg mb-8">
                <button onclick="popHearts(event)"
                    class="group px-10 py-6 bg-rose-400 hover:bg-rose-500 text-white rounded-full font-medium transition-all shadow-xl hover:shadow-2xl active:scale-95 flex items-center justify-center gap-3 relative z-10 text-lg w-full">
                    💖 Goodluck po, kaya po natin 'to! 💖
                </button>
                <p class="text-rose-700/60 font-light text-sm mt-6 italic">Click the button above!</p>
            </div>

            <button onclick="goToPage(2)"
                class="px-8 py-3 bg-white/30 hover:bg-white/50 border border-white/40 text-rose-800 rounded-full font-medium transition-all active:scale-95">←
                Back to Cards</button>
        </div>
    </div>

    <script>
        const cardsData = [
            {
                title: "Hingang malalim. Okay lang ang lahat.",
                response: "Relax ka lang po. Huwag madaliin ang lahat. Andito lang ako sa tabi mo. Kalma ka lang."
            },
            {
                title: "Pahinga muna. It is part of progress.",
                response: "Kailangan mo rin ng break. Hindi race ang buhay. Okay lang mag-pause today. Rest well."
            },
            {
                title: "Okay lang mapagod. Tao ka lang.",
                response: "Minsan, the bravest thing you can do is to pause, not to quit, but to take care of yourself. Rest ka muna"
            },
            {
                title: "One step at a time lang, okay?",
                response: "Dahan-dahan lang muna. Isang bagay lang muna ayusin. Magagawa mo din 'yan."
            },
            {
                title: "Proud ako sa'yo.",
                response: "Kahit maliit, progress pa rin 'yun. Wag ikumpara ang sarili sa iba. Proud ako sa pacing mo."
            },
            {
                title: "Enough ka na.",
                response: "No need to be productive today. Huminga ka lang. Sapat ka na kahit wala kang gawin."
            }
        ];

        const container = document.getElementById('support-cards');

        cardsData.forEach((card, index) => {
            const el = document.createElement('div');
            el.className = "glass-card p-8 rounded-3xl cursor-pointer text-center flex flex-col items-center justify-center";
            el.onclick = () => toggleMessage(index);

            el.innerHTML = `
                <h3 class="text-rose-800 font-medium">${card.title}</h3>
                <p id="msg-${index}" class="message-reveal text-sm italic font-light">${card.response}</p>
            `;

            container.appendChild(el);
        });

        let activeCard = -1;

        function toggleMessage(index) {
            const msg = document.getElementById(`msg-${index}`);

            if (activeCard !== -1 && activeCard !== index) {
                document.getElementById(`msg-${activeCard}`).classList.remove('active');
            }

            msg.classList.toggle('active');
            activeCard = index;
        }

        function goToPage(num) {
            const allPages = document.querySelectorAll('.page-section');
            allPages.forEach(p => {
                p.style.opacity = '0';
                p.classList.remove('active');
            });

            setTimeout(() => {
                const target = document.getElementById(`page-${num}`);
                target.classList.add('active');
                void target.offsetWidth;
                target.style.opacity = '1';
            }, 300);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function popHearts(e) {
            for (let i = 0; i < 25; i++) {
                const heart = document.createElement('div');
                const heartTypes = ['💖', '❤️', '💕', '💗', '💓'];
                heart.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
                heart.className = 'floating-heart';

                heart.style.left = e.clientX + (Math.random() * 160 - 80) + 'px';
                heart.style.top = (e.clientY + window.scrollY - 30) + 'px';

                const duration = 1.2 + Math.random() * 1.5;
                heart.style.animationDuration = duration + 's';

                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), duration * 1000);
            }
        }
    </script>
</body>

</html>
